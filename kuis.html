<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quiz Pengetahuan Herbarium</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style-kuis.css"/>
</head>
<body class="quiz-page">

  <nav class="navbar navbar-dark">
    <div class="container d-flex align-items-center">
      <a id="btn-back" href="#" class="btn btn-link text-white p-0 me-3">
        <i class="bi bi-arrow-left"></i> Kembali
      </a>
      <span class="navbar-text mx-auto fw-semibold text-white">
        Quiz Pengetahuan Herbarium
      </span>
      <a href="#" id="btn-next" class="ms-auto btn btn-link text-white d-none">
        Selanjutnya <i class="bi bi-arrow-right"></i>
      </a>
    </div>
  </nav>

  <div class="container py-5" id="quiz-area">
    <div class="text-center mb-4">
      <p class="text-muted" id="quiz-progress">Pertanyaan</p>
      <h5 class="fw-semibold" id="quiz-question">Soal akan tampil di sini</h5>
    </div>
    <div class="quiz-options"></div>
  </div>
  <div class="container text-center d-none" id="empty-message">
    <p class="text-danger">Soal belum tersedia untuk spesimen ini.</p>
  </div>

  <script src="js/quiz-data.js"></script>
  <script src="js/kuis.js"></script>
</body>
</html>
