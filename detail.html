<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detail Spesimen</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <!-- CSS Kustom -->
  <link rel="stylesheet" href="css/style-spesimen.css" />
</head>
<body class="daftar-spesimen detail-page">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #003B87;">
    <div class="container d-flex align-items-center">
      <!-- Tombol Kembali -->
      <a href="spesimen.html" class="btn btn-link btn-back p-0 me-3 text-white">
        <i class="bi bi-arrow-left"></i> Kembali
      </a>
      <!-- Judul -->
      <span class="navbar-text mx-auto nav-title">Detail Spesimen</span>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="container py-5">
    <div class="row align-items-center">
      
      <!-- Gambar & Nama -->
      <div class="col-md-4 text-center">
        <div class="detail-specimen-img">
          <!-- Gambar akan di-set via JS -->
          <img id="specimen-img" src="" alt="Spesimen" />
        </div>
        <h3 class="fw-bold mt-3" id="specimen-name"></h3>
        <p class="text-muted mb-1" id="specimen-latin"></p>
        <div id="specimen-type" class="d-flex flex-wrap gap-2 justify-content-center mt-2"></div>
        <!-- <span class="badge bg-info text-dark" id="specimen-type"></span> -->
      </div>

      <!-- Deskripsi & Manfaat -->
      <div class="col-md-8">
        <h5 class="text-primary fw-semibold">Deskripsi</h5>
        <p id="specimen-description" class="mb-4"></p>

        <h5 class="text-primary fw-semibold">Manfaat</h5>
        <ul id="specimen-benefits" class="list-unstyled mb-4">
          <!-- List manfaat via JS -->
        </ul>

        <!-- Tombol Aksi -->
        <div class="d-flex flex-wrap gap-2">
          <a id="btn-video" href="#" class="btn btn-video" target="_blank">
            <i class="bi bi-play-circle"></i> Tonton Video
          </a>
          <a id="btn-kuis" href="#" class="btn btn-kuis">
            <i class="bi bi-check-circle"></i> Kuis Pengetahuan
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- Skrip Data & Rendering -->
  <script src="js/data.js"></script>
  <script>
    // Ambil parameter id dari URL
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'), 10);
    document.getElementById('btn-kuis').href = `kuis.html?id=${id}`;

    // Cari data spesimen
    const sp = spesimenData.find(s => s.id === id) || {};

    // Isi konten
    document.getElementById('specimen-img').src = `assets/images/${sp.gambar_detail}`;
    document.getElementById('specimen-name').textContent = sp.nama;
    document.getElementById('specimen-latin').textContent = sp.latin;
    // document.getElementById('specimen-type').textContent = sp.type;
    const typeContainer = document.getElementById('specimen-type');

    // Jika type array, render banyak badge. Jika bukan, tampilkan satu.
      if (Array.isArray(sp.type)) {
        typeContainer.innerHTML = sp.type.map(t => {
          let badgeClass = 'badge-base';

          const lower = t.toLowerCase();

          if (lower.includes("rimpang")) {
            badgeClass += ' badge-rimpang';
          } else if (lower.includes("daun")) {
            badgeClass += ' badge-daun';
          } else if (lower.includes("antiseptik")) {
            badgeClass += ' badge-antiseptik';
          } else {
            badgeClass += ' badge-default';
          }

          return `<span class="${badgeClass}">${t}</span>`;
        }).join('');
        } else {
          typeContainer.innerHTML = `<span class="badge badge-base badge-default">${sp.type}</span>`;
        }



    document.getElementById('specimen-description').textContent = sp.description;

    // Manfaat
    const ul = document.getElementById('specimen-benefits');
    sp.benefits.forEach(b => {
      const li = document.createElement('li');
      li.innerHTML = `<i class="bi bi-dot"></i> ${b}`;
      ul.appendChild(li);
    });

    // Tombol link
    document.getElementById('btn-video').href = sp.videoUrl;
    document.getElementById('btn-quiz').href = sp.quizUrl;
  </script>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
