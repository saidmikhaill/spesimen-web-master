<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hasil Quiz - Herbarium</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- CSS Kustom -->
  <link rel="stylesheet" href="css/style-hasil.css" />
</head>
<body class="hasil-page">

  <!-- Navbar -->
    <nav class="navbar navbar-dark" style="background-color: #003B87;">
    <div class="container d-flex align-items-center">
      <a id="btn-home" href="spesimen.html" class="btn btn-link text-white p-0 me-3">
        <i class="bi bi-house-fill"></i> Beranda
      </a>
      <span class="navbar-text mx-auto fw-semibold text-white">Hasil Quiz</span>
    </div>
  </nav>

  <!-- Konten -->
  <div class="container py-5 text-center">
    <!-- Lingkaran Nilai -->
    <div id="result-circle" class="result-circle mx-auto mb-4">
      <span id="result-percent" class="result-text">0%</span>
      <div class="small text-secondary">Nilai Anda</div>
    </div>

    <!-- Card Statistik -->
    <div class="result-card mx-auto mb-4">
      <div class="row">
        <div class="col text-start">Total Pertanyaan</div>
        <div class="col text-end" id="stat-total">0</div>
      </div>
      <div class="row mt-2">
        <div class="col text-start">Jawaban Benar</div>
        <div class="col text-end text-success" id="stat-correct">0</div>
      </div>
      <div class="row mt-2">
        <div class="col text-start">Jawaban Salah</div>
        <div class="col text-end text-danger" id="stat-wrong">0</div>
      </div>
    </div>

    <!-- Tombol Aksi -->
    <div class="d-flex justify-content-center gap-3">
      <a href="#" id="btn-review" class="btn btn-outline-primary px-4">
        <i class="bi bi-list-nested"></i> Lihat Jawaban
      </a>
      <a href="#" id="btn-retry" class="btn btn-success px-4">
        <i class="bi bi-arrow-clockwise"></i> Coba Lagi
      </a>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script Hasil -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const score = parseInt(params.get('score'), 10) || 0;
    const total = parseInt(params.get('total'), 10) || 0;
    const id = params.get('id') || '';

    const wrong = total - score;
    const percent = total ? Math.round((score/total)*100) : 0;

    // Tentukan warna berdasarkan persen
    let color = '';
    if (percent >= 76) color = '#28a745';        // hijau
    else if (percent >= 51) color = '#ffc107';   // kuning
    else if (percent >= 26) color = '#fd7e14';   // jingga
    else color = '#dc3545';                      // merah

    // Isi nilai & statistik
    document.getElementById('result-percent').textContent = percent + '%';
    const circle = document.getElementById('result-circle');
    circle.style.borderColor = color;
    
    document.getElementById('result-percent').style.color = color;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-correct').textContent = score;
    document.getElementById('stat-wrong').textContent = wrong;

    // Tombol review (bisa diarahkan ke page review detail)
    document.getElementById('btn-review').href = `review.html?id=${id}`;

    // Tombol retry kembali ke kuis
    document.getElementById('btn-retry').href = `kuis.html?id=${id}`;
  </script>
</body>
</html>
