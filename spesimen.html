<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Spesimen</title>

  <!-- Google Fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  
  <!-- CSS Kustom -->
  <link rel="stylesheet" href="css/style-spesimen.css" />
</head>
<body class="daftar-spesimen">

<!-- ✅ NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #003B87;">
    <div class="container d-flex align-items-center">
    	<a href="index.html" class="btn btn-link btn-back p-0 me-3 text-white">
    	<i class="bi bi-arrow-left"></i> Kembali</a>
      	<span class="navbar-text mx-auto nav-title">Spesimen Herbarium</span>
      	<!-- <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button> -->
    </div>
  </nav>
  
  <!-- Area Kartu Spesimen -->
  <div class="container pt-4 pb-5">
    <div class="row g-4" id="spesimen-list">
      <!-- Kartu spesimen akan dimasukkan di sini oleh JavaScript -->
    </div>
  </div>

  <!-- Script untuk membaca data JSON dan menampilkan spesimen -->
  <script src="js/data.js"></script>
  <script>
    // Ambil elemen tempat menampilkan daftar spesimen
    const container = document.getElementById("spesimen-list");

    // Loop semua spesimen dari data.js
    spesimenData.forEach(spesimen => {
      // Buat HTML untuk setiap spesimen
      const card = `
        <div class="col-md-4">
  <div class="card">
    <div class="specimen">
      <img src="assets/images/${spesimen.gambar}" alt="${spesimen.nama}">
    </div>
    <div class="card-body d-flex flex-column justify-content-between">
      <div>
        <h5 class="card-title">${spesimen.nama}</h5>
        <p class="card-text">${spesimen.deskripsi.slice(0, 80)}...</p>
      </div>
      <a href="detail.html?id=${spesimen.id}" class="btn btn-primary mt-2">Pelajari</a>
    </div>
  </div>
</div>
`;
      // Tambahkan ke kontainer
      container.innerHTML += card;
    });
  </script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
