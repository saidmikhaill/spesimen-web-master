<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Jawaban - Herbarium</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style-review.css"/>
</head>
<body class="review-page">
  <nav class="navbar navbar-dark" style="background-color: #003B87;">
    <div class="container d-flex align-items-center">
      <a id="btn-home" href="spesimen.html" class="btn btn-link text-white p-0 me-3">
        <i class="bi bi-house-fill"></i> Beranda
      </a>
      <span class="navbar-text mx-auto fw-semibold text-white">Lihat Jawaban</span>
    </div>
  </nav>

  <div class="container py-5">
    <div id="review-list" class="row gy-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/quiz-data.js"></script>
  <!-- Debuggable Review Script -->
  <script>
    console.log("=== Review Page Loaded ===");
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'), 10);
    console.log("Spesimen ID:", id);

    const userAnswers = JSON.parse(localStorage.getItem(`answers-${id}`)) || [];
    console.log("User Answers:", userAnswers);

    const soalSpesimen = quizData[id] || [];
    console.log("Quiz Questions:", soalSpesimen);

    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = '';

    if (!soalSpesimen.length) {
      reviewList.innerHTML = `<p class="text-center text-danger">Soal belum tersedia untuk spesimen ini.</p>`;
    } else {
      soalSpesimen.forEach((q, idx) => {
        const user = userAnswers[idx];
        const correct = q.jawaban;
        console.log(`Pertanyaan ${idx+1}: user=${user}, correct=${correct}`);

        const col = document.createElement('div');
        col.className = 'col-12';

        let html = `
          <div class="card p-3 shadow-sm">
            <h6 class="fw-semibold">Pertanyaan ${idx+1}</h6>
            <p class="mb-2">${q.soal}</p>`;

        q.pilihan.forEach((opt, i) => {
          let cls = 'opt-default';
          if (i === correct) cls = 'opt-correct';
          if (i === user && i !== correct) cls = 'opt-wrong';
          html += `<div class="option ${cls}">${String.fromCharCode(65+i)}. ${opt}</div>`;
        });

        html += `</div>`;
        col.innerHTML = html;
        reviewList.appendChild(col);
      });
    }
  </script>
</body>
</html>
